name: IIVAS biannual data refresh

# Runs twice a year and can also be launched manually from the Actions tab.
#   - 06:00 UTC on 1 September  (after the 31 Aug N-PX filing deadline)
#   - 06:00 UTC on 1 March      (catches late filings & N-PX/A amendments)
#
# CAVEAT: GitHub disables scheduled workflows in repos with no activity for
# 60 days (public repos on free plans). With a twice-a-year cadence this WILL
# trigger unless the repo sees an occasional commit, or you re-enable the
# workflow from the Actions tab when GitHub emails you. See
# docs/SUPABASE_SETUP.md Part 4 for mitigations.
on:
  schedule:
    - cron: "0 6 1 3,9 *"
  workflow_dispatch: {}          # manual "Run workflow" button

concurrency:
  group: iivas-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # A full multi-trust Big-Three pull + parse can be heavy; 60 min was
    # optimistic. If you hit the ceiling, narrow config years or filers.
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('stopwords'); nltk.download('punkt')"

      - name: Run full pipeline into Supabase
        env:
          # Store these in the repo:  Settings -> Secrets and variables -> Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          python -m src.run_pipeline

      - name: Upload processed artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iivas-processed-${{ github.run_id }}
          path: |
            data/processed/*.csv
            reports/figures/*.png
          if-no-files-found: ignore
          retention-days: 90
